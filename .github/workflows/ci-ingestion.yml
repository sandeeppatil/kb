name: CI – Ingestion Pipeline

on:
  push:
    branches:
      - feature/ingestion-pipeline
      - main
    paths:
      - 'ingestion/**'
      - 'tests/**'
      - 'requirements-ingestion.txt'
      - '.github/workflows/ci-ingestion.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'ingestion/**'
      - 'tests/**'
      - 'requirements-ingestion.txt'
      - '.github/workflows/ci-ingestion.yml'

jobs:
  test-ingestion:
    name: Test Ingestion Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ingestion-${{ hashFiles('requirements-ingestion.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ingestion-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ingestion.txt

      - name: Lint with ruff
        run: |
          ruff check ingestion/ tests/

      - name: Type-check with mypy
        run: |
          mypy ingestion/ --ignore-missing-imports

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --cov=ingestion --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
